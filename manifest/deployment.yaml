---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedoom
  namespace: kubedoom
  labels:
    app: kubedoom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubedoom
  template:
    metadata:
      labels:
        app: kubedoom
    spec:
      serviceAccountName: kubedoom
      containers:
        - name: kubedoom
          image: ghcr.io/storax/kubedoom:latest
          env:
            - name: NAMESPACE
              value: kubedoom-monsters   # target namespace
          ports:
            - containerPort: 5900
              name: vnc