---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubedoom
  namespace: kubedoom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubedoom
rules:
- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubedoom
subjects:
- kind: ServiceAccount
  name: kubedoom
  namespace: kubedoom
roleRef:
  kind: ClusterRole
  name: kubedoom
  apiGroup: rbac.authorization.k8s.io
